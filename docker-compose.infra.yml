name: vocab-estimator-infra

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vocab_estimator
      POSTGRES_USER: vocab
      POSTGRES_PASSWORD: vocab
    ports:
      - "5432:5432"
    volumes:
      - postgres_infra_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vocab -d vocab_estimator"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_infra_data:
