services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: vocab_estimator
      POSTGRES_USER: vocab
      POSTGRES_PASSWORD: vocab
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vocab -d vocab_estimator"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      VOCAB_DATABASE_URL: postgresql+psycopg://vocab:vocab@postgres:5432/vocab_estimator
      VOCAB_WORD_RANK_PATH: data/wordlists/word_rank.csv
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    depends_on:
      - api
    ports:
      - "8080:80"

volumes:
  postgres_data:

